name: Docker

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  codeql:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python

  changes:
    name: Detect affected images
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.detect.outputs.stable }}
      beta: ${{ steps.detect.outputs.beta }}
      image_matrix: ${{ steps.detect.outputs.image_matrix }}
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed images
        id: detect
        shell: bash
        run: |
          STABLE=false
          BETA=false
          CHANGED_FILES=()

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            read -r BASE_SHA HEAD_SHA < <(
              jq -r '[.pull_request.base.sha, .pull_request.head.sha] | @tsv' "$GITHUB_EVENT_PATH"
            )

            if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null &&
              git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
            else
              echo "Could not inspect the complete pull request range; rebuilding all images."
              STABLE=true
              BETA=true
            fi
          else
            read -r BASE_SHA HEAD_SHA < <(
              jq -r '[.before, .after] | @tsv' "$GITHUB_EVENT_PATH"
            )

            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              mapfile -t CHANGED_FILES < <(git diff-tree --root --no-commit-id --name-only -r "$HEAD_SHA")
            elif git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null &&
              git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
            else
              echo "Could not inspect the complete push range; rebuilding all images."
              STABLE=true
              BETA=true
            fi
          fi

          for file in "${CHANGED_FILES[@]}"; do
            echo "Changed: $file"
            case "$file" in
              release)
                STABLE=true
                ;;
              beta-release)
                BETA=true
                ;;
              Dockerfile|Dockerfile.headless|cronitor.py|entrypoint.sh|xcserver.sh|configure_cron_schedule.sh|.github/workflows/docker-publish.yml)
                STABLE=true
                BETA=true
                ;;
            esac
          done

          IMAGE_MATRIX=$(jq -cn \
            --argjson stable "$STABLE" \
            --argjson beta "$BETA" \
            '[
              if $stable then
                {
                  id: "stable",
                  image: "ghcr.io/groenator/iptvboss-docker",
                  dockerfile: "Dockerfile",
                  version_file: "release",
                  build_arg: "LATEST_TAG"
                },
                {
                  id: "headless-stable",
                  image: "ghcr.io/groenator/iptvboss-docker-headless-stable",
                  dockerfile: "Dockerfile.headless",
                  version_file: "release",
                  build_arg: "LATEST_TAG"
                }
              else empty end,
              if $beta then
                {
                  id: "beta",
                  image: "ghcr.io/groenator/iptvboss-docker-beta",
                  dockerfile: "Dockerfile",
                  version_file: "beta-release",
                  build_arg: "BETA_TAG"
                },
                {
                  id: "headless-beta",
                  image: "ghcr.io/groenator/iptvboss-docker-headless-beta",
                  dockerfile: "Dockerfile.headless",
                  version_file: "beta-release",
                  build_arg: "BETA_TAG"
                }
              else empty end
            ]')

          BUILD_MATRIX=$(jq -c '
            [
              .[] as $image |
              [
                {arch: "amd64", platform: "linux/amd64", runner: "ubuntu-24.04"},
                {arch: "arm64", platform: "linux/arm64", runner: "ubuntu-24.04-arm"}
              ][] as $platform |
              $image + $platform
            ]
          ' <<< "$IMAGE_MATRIX")

          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "beta=$BETA" >> "$GITHUB_OUTPUT"
          echo "image_matrix=$IMAGE_MATRIX" >> "$GITHUB_OUTPUT"
          echo "build_matrix=$BUILD_MATRIX" >> "$GITHUB_OUTPUT"
          echo "Build stable images: $STABLE"
          echo "Build beta images: $BETA"
          echo "Platform build matrix: $BUILD_MATRIX"

  build_platforms:
    name: Build ${{ matrix.id }} (${{ matrix.arch }})
    if: needs.changes.outputs.build_matrix != '[]' && needs.codeql.result == 'success'
    needs: [changes, codeql]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.build_matrix) }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read release version
        id: version
        shell: bash
        env:
          VERSION_FILE: ${{ matrix.version_file }}
        run: |
          if [[ ! -s "$VERSION_FILE" ]]; then
            echo "$VERSION_FILE is missing or empty"
            exit 1
          fi
          VERSION=$(tr -d '\r\n' < "$VERSION_FILE")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate platform image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.build_arg }}=${{ steps.version.outputs.version }}
          push: false
          cache-from: type=gha,scope=${{ matrix.id }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}-${{ matrix.arch }},ignore-error=true

      - name: Build and push platform image by digest
        id: build
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.build_arg }}=${{ steps.version.outputs.version }}
          outputs: type=image,name=${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.id }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}-${{ matrix.arch }},ignore-error=true

      - name: Export image digest
        if: github.event_name == 'push'
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image digest: $DIGEST"
            exit 1
          fi
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload image digest
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.id }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_manifests:
    name: Publish ${{ matrix.id }} manifest
    if: |
      github.event_name == 'push' &&
      needs.changes.outputs.image_matrix != '[]' &&
      needs.codeql.result == 'success' &&
      needs.build_platforms.result == 'success'
    needs: [changes, codeql, build_platforms]
    strategy:
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.image_matrix) }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Read release version
        id: version
        shell: bash
        env:
          VERSION_FILE: ${{ matrix.version_file }}
        run: |
          VERSION=$(tr -d '\r\n' < "$VERSION_FILE")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download image digests
        uses: actions/download-artifact@v5
        with:
          pattern: digests-${{ matrix.id }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Create multi-platform manifest
        shell: bash
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ matrix.image }}
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          TAG_ARGS=()
          while IFS= read -r tag; do
            TAG_ARGS+=(--tag "$tag")
          done < <(jq -r '.tags[]' <<< "$METADATA_JSON")

          SOURCES=()
          for digest in *; do
            SOURCES+=("${IMAGE}@sha256:${digest}")
          done

          if (( ${#SOURCES[@]} != 2 )); then
            echo "Expected 2 platform digests, found ${#SOURCES[@]}"
            exit 1
          fi

          docker buildx imagetools create "${TAG_ARGS[@]}" "${SOURCES[@]}"

      - name: Inspect multi-platform image
        env:
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ steps.version.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"
