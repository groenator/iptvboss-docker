name: Docker

on:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - Dockerfile.headless
      - cronitor.py
      - entrypoint.sh
      - xcserver.sh
      - configure_cron_schedule.sh
      - release
      - beta-release
      - .github/workflows/docker-publish.yml
  pull_request:
    paths:
      - Dockerfile
      - Dockerfile.headless
      - cronitor.py
      - entrypoint.sh
      - xcserver.sh
      - configure_cron_schedule.sh
      - release
      - beta-release
      - .github/workflows/docker-publish.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Define environment variables
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    name: Detect affected release channels
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.detect.outputs.stable }}
      beta: ${{ steps.detect.outputs.beta }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed release channels
        id: detect
        shell: bash
        run: |
          STABLE=false
          BETA=false
          CHANGED_FILES=()

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            read -r BASE_SHA HEAD_SHA < <(
              jq -r '[.pull_request.base.sha, .pull_request.head.sha] | @tsv' "$GITHUB_EVENT_PATH"
            )

            if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null &&
              git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA...$HEAD_SHA")
            else
              echo "Could not inspect the complete pull request range; rebuilding all channels."
              STABLE=true
              BETA=true
            fi
          else
            read -r BASE_SHA HEAD_SHA < <(
              jq -r '[.before, .after] | @tsv' "$GITHUB_EVENT_PATH"
            )

            if [[ "$BASE_SHA" =~ ^0+$ ]]; then
              mapfile -t CHANGED_FILES < <(git diff-tree --root --no-commit-id --name-only -r "$HEAD_SHA")
            elif git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null &&
              git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
            else
              echo "Could not inspect the complete push range; rebuilding all channels."
              STABLE=true
              BETA=true
            fi
          fi

          for file in "${CHANGED_FILES[@]}"; do
            echo "Changed: $file"
            case "$file" in
              release)
                STABLE=true
                ;;
              beta-release)
                BETA=true
                ;;
              Dockerfile|Dockerfile.headless|cronitor.py|entrypoint.sh|xcserver.sh|configure_cron_schedule.sh|.github/workflows/docker-publish.yml)
                STABLE=true
                BETA=true
                ;;
            esac
          done

          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "beta=$BETA" >> "$GITHUB_OUTPUT"
          echo "Build stable images: $STABLE"
          echo "Build beta images: $BETA"

  build-stable:
    if: needs.changes.outputs.stable == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: groenator
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for release file
        run: |
          if [[ ! -f release || ! -s release ]]; then
            echo "release file is missing or empty"
            exit 1
          fi

      - name: Set release tag as environment variable
        id: set-stable-tag
        run: |
          echo -e "LATEST_TAG=$(cat release)" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          images: |
            ghcr.io/groenator/iptvboss-docker
          tags: |
            type=ref,event=pr
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}.{{patch}}
            type=semver,pattern=v{{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ env.LATEST_TAG }},enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push final image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LATEST_TAG=${{ env.LATEST_TAG }}
          tags: ${{ steps.meta.outputs.tags }}
          push: ${{ github.event_name == 'push' }}
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Clean Buildx Cache
        run: docker buildx prune -f --all

  build-headless-stable:
      if: needs.changes.outputs.stable == 'true'
      needs: [changes]
      runs-on: ubuntu-latest
      permissions:
        contents: read
        packages: write
      steps:
        - name: Checkout repository
          uses: actions/checkout@v5
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4
        - name: Log into registry ${{ env.REGISTRY }}
          if: github.event_name == 'push'
          uses: docker/login-action@v4
          with:
            registry: ${{ env.REGISTRY }}
            username: groenator
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Check for release file
          run: |
            if [[ ! -f release || ! -s release ]]; then
              echo "release file is missing or empty"
              exit 1
            fi

        - name: Set release tag as environment variable
          id: set-stable-tag
          run: |
            echo -e "LATEST_TAG=$(cat release)" >> $GITHUB_ENV
        - name: Extract Docker metadata
          id: meta
          uses: docker/metadata-action@v6
          with:
            flavor: |
              latest=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            images: |
              ghcr.io/groenator/iptvboss-docker-headless-stable
            tags: |
              type=ref,event=pr
              type=semver,pattern=v{{major}}.{{minor}}
              type=semver,pattern=v{{major}}.{{minor}}.{{patch}}
              type=semver,pattern=v{{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
              type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
              type=raw,value=${{ env.LATEST_TAG }},enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}
        - name: Build and push final image
          uses: docker/build-push-action@v7
          with:
            platforms: linux/amd64,linux/arm64
            labels: ${{ steps.meta.outputs.labels }}
            build-args: |
              LATEST_TAG=${{ env.LATEST_TAG }}
            tags: ${{ steps.meta.outputs.tags }}
            push: ${{ github.event_name == 'push' }}
            context: .
            file: Dockerfile.headless
        - name: Clean Buildx Cache
          run: docker buildx prune -f --all

  build-beta:
    if: needs.changes.outputs.beta == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: groenator
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for beta-release file
        run: |
          if [[ ! -f beta-release || ! -s beta-release ]]; then
            echo "beta-release file is missing or empty"
            exit 1
          fi

      - name: Set release beta-tag as environment variable
        id: set-beta-tag
        run: |
          echo -e "BETA_TAG=$(cat beta-release)" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta-beta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          images: |
            ghcr.io/groenator/iptvboss-docker-beta
          tags: |
            type=ref,event=pr
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}.{{patch}}
            type=semver,pattern=v{{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ env.BETA_TAG }},enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push final image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta-beta.outputs.labels }}
          build-args: |
            BETA_TAG=${{ env.BETA_TAG }}
          tags: ${{ steps.meta-beta.outputs.tags }}
          push: ${{ github.event_name == 'push' }}
          context: .
      - name: Clean Buildx Cache
        run: docker buildx prune -f --all

  build-headless-beta:
    if: needs.changes.outputs.beta == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: groenator
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for beta-release file
        run: |
          if [[ ! -f beta-release || ! -s beta-release ]]; then
            echo "beta-release file is missing or empty"
            exit 1
          fi

      - name: Set release tag as environment variable
        id: set-beta-tag
        run: |
          echo -e "BETA_TAG=$(cat beta-release)" >> $GITHUB_ENV

      - name: Extract Docker metadata
        id: meta-beta
        uses: docker/metadata-action@v6
        with:
          flavor: |
            latest=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          images: |
            ghcr.io/groenator/iptvboss-docker-headless-beta
          tags: |
            type=ref,event=pr
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}.{{minor}}.{{patch}}
            type=semver,pattern=v{{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ env.BETA_TAG }},enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push final image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta-beta.outputs.labels }}
          build-args: |
            BETA_TAG=${{ env.BETA_TAG }}
          tags: ${{ steps.meta-beta.outputs.tags }}
          push: ${{ github.event_name == 'push' }}
          context: .
          file: Dockerfile.headless
      - name: Clean Buildx Cache
        run: docker buildx prune -f --all
